<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majalah Aktualisasi — Laporan Latsar CPNS 2026</title>
  <meta name="description"
    content="Majalah digital interaktif Laporan Aktualisasi Latsar CPNS Golongan III Angkatan I Tahun 2026 — Masyhuri Arifin, S.E.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════
       ROOT / DESIGN TOKENS
    ══════════════════════════════════════════════ */
    :root {
      --c-bg: #1a1520;
      --c-bg2: #221c2a;
      --c-surface: #f5f0e8;
      --c-surface2: #ede6d8;
      --c-paper: #faf7f2;
      --c-paper-dark: #f0ead8;
      --c-paper-shadow: rgba(0, 0, 0, 0.35);
      --c-border: rgba(0, 0, 0, 0.08);
      --c-border-accent: rgba(139, 90, 43, 0.25);
      --c-text: #3d3229;
      --c-text-dim: #8a7e70;
      --c-heading: #1a1008;
      --c-accent: #8b5a2b;
      --c-accent2: #6b4c8a;
      --c-accent3: #c05050;
      --c-green: #2d7a4f;
      --c-orange: #c07830;
      --c-red: #b03a3a;
      --c-gold: #b8963e;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 4px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --page-width: 520px;
      --page-height: 700px;
    }

    @media (max-width: 1100px) {
      :root {
        --page-width: 420px;
        --page-height: 600px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-width: 360px;
        --page-height: 540px;
      }
    }

    @media (max-width: 768px) {
      :root {
        --page-width: min(90vw, 380px);
        --page-height: min(75vh, 560px);
      }
    }

    /* ══════════════════════════════════════════════
       RESET
    ══════════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background: var(--c-bg);
      color: var(--c-text);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ══════════════════════════════════════════════
       FULLSCREEN MODE
    ══════════════════════════════════════════════ */
    body.fullscreen-active {
      overflow: hidden;
      justify-content: center;
      --page-height: 94vh !important;
      --page-width: calc(94vh * 0.7428) !important;
    }
    
    body.fullscreen-active .topbar {
      transform: translateY(-100%);
      opacity: 0;
    }
    
    body.fullscreen-active .book-scene {
      margin: 0 auto !important;
    }
    
    @media (max-width: 768px) {
      body.fullscreen-active {
        --page-width: 95vw !important;
        --page-height: calc(95vw * 1.346) !important;
      }
    }
    
    body.fullscreen-active .nav-controls {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      width: 100%;
      transform: translateY(-50%);
      justify-content: space-between;
      padding: 0 15px;
      pointer-events: none;
      z-index: 100;
    }
    
    body.fullscreen-active .nav-btn {
      pointer-events: auto;
      width: 50px;
      height: 50px;
      font-size: 1.2rem;
      background: rgba(26, 21, 32, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    body.fullscreen-active .nav-info {
      display: none;
    }
    
    body.fullscreen-active .nav-dots,
    body.fullscreen-active .kb-hints {
      display: none;
    }

    .exit-fs-btn {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 999;
      background: rgba(26, 21, 32, 0.7);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      backdrop-filter: blur(5px);
      transition: all 0.3s;
    }
    
    body.fullscreen-active .exit-fs-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .exit-fs-btn:hover {
      background: var(--c-red);
      transform: scale(1.1);
    }

    /* ══════════════════════════════════════════════
       AMBIENT BACKGROUND
    ══════════════════════════════════════════════ */
    .ambient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 100% 80% at 50% 30%, #2a1f30 0%, var(--c-bg) 70%),
        radial-gradient(circle at 20% 80%, rgba(139, 90, 43, 0.08), transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(107, 76, 138, 0.08), transparent 50%);
    }

    .ambient-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.5;
    }

    /* ══════════════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════════════ */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 900;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1rem, 3vw, 2.5rem);
      background: rgba(26, 21, 32, 0.85);
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: #e8ddd0;
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: -0.01em;
    }

    .topbar-brand .brand-icon {
      font-size: 1.1rem;
    }

    .topbar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #8a7e70;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .topbar-center .page-indicator {
      background: var(--c-accent);
      color: #fff;
      padding: 0.15rem 0.55rem;
      border-radius: 50px;
      font-size: 0.6rem;
      font-weight: 700;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .topbar-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #8a7e70;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s var(--ease);
      text-decoration: none;
      padding: 0;
      margin: 0;
      outline: none;
      font-family: inherit;
    }

    .topbar-btn:hover {
      color: #e8ddd0;
      border-color: var(--c-accent);
      background: rgba(139, 90, 43, 0.12);
      transform: translateY(-1px);
    }

    /* ══════════════════════════════════════════════
       BOOK CONTAINER
    ══════════════════════════════════════════════ */
    .book-scene {
      position: relative;
      z-index: 1;
      width: calc(var(--page-width) * 2);
      height: var(--page-height);
      perspective: 2000px;
      margin: 80px auto 40px;
    }

    @media (max-width: 768px) {
      .book-scene {
        width: var(--page-width);
        margin: 70px auto 30px;
      }
    }

    .book {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    /* ══════════════════════════════════════════════
       PAGES
    ══════════════════════════════════════════════ */
    .page {
      position: absolute;
      width: var(--page-width);
      height: var(--page-height);
      top: 0;
      right: 0;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1);
      cursor: pointer;
      z-index: 1;
    }

    @media (max-width: 768px) {
      .page {
        width: 100%;
      }
    }

    .page.flipped {
      transform: rotateY(-180deg);
    }

    .page-front,
    .page-back {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      border-radius: 2px 8px 8px 2px;
    }

    .page-front {
      background: var(--c-paper);
      z-index: 2;
      /* Paper texture */
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    }

    .page-back {
      background: var(--c-paper-dark);
      transform: rotateY(180deg);
      z-index: 1;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* Page shadow / fold effect */
    .page-front::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 40px;
      background: linear-gradient(to left,
          rgba(0, 0, 0, 0.06) 0%,
          rgba(0, 0, 0, 0.02) 40%,
          transparent 100%);
      pointer-events: none;
    }

    .page-back::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 40px;
      background: linear-gradient(to right,
          rgba(0, 0, 0, 0.1) 0%,
          rgba(0, 0, 0, 0.03) 40%,
          transparent 100%);
      pointer-events: none;
    }

    /* Dynamic shadow during flip */
    .page::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0);
      pointer-events: none;
      transition: background 0.9s;
      z-index: 100;
      border-radius: 2px 8px 8px 2px;
    }

    /* Book spine shadow */
    .book::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -10px;
      bottom: -10px;
      width: 10px;
      transform: translateX(-50%);
      background: linear-gradient(90deg,
          rgba(0, 0, 0, 0.2),
          rgba(0, 0, 0, 0.35),
          rgba(0, 0, 0, 0.2));
      z-index: 999;
      border-radius: 2px;
    }

    @media (max-width: 768px) {
      .book::before {
        left: 0;
        transform: none;
      }
    }

    /* Book shadow on table */
    .book-shadow {
      position: absolute;
      left: 5%;
      right: 5%;
      bottom: -20px;
      height: 30px;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.35) 0%, transparent 70%);
      filter: blur(8px);
      z-index: -1;
    }

    /* ══════════════════════════════════════════════
       PAGE CONTENT STYLING
    ══════════════════════════════════════════════ */
    .page-content {
      width: 100%;
      height: 100%;
      padding: 2rem 2rem 2.5rem;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: rgba(139, 90, 43, 0.2) transparent;
    }

    .page-content::-webkit-scrollbar {
      width: 4px;
    }

    .page-content::-webkit-scrollbar-thumb {
      background: rgba(139, 90, 43, 0.2);
      border-radius: 4px;
    }

    .page-content::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Page number */
    .pg-num {
      position: absolute;
      bottom: 0.8rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--c-text-dim);
      letter-spacing: 0.08em;
      opacity: 0.6;
      z-index: 5;
    }

    .pg-num.left {
      left: 1.5rem;
    }

    .pg-num.right {
      right: 1.5rem;
    }

    /* ══════════════════════════════════════════════
       COVER PAGE
    ══════════════════════════════════════════════ */
    .cover-front {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1a2a3a 0%, #0d1520 40%, #1a1525 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .cover-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(139, 90, 43, 0.15), transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(107, 76, 138, 0.1), transparent 50%);
    }

    .cover-front::after {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(184, 150, 62, 0.2);
      border-radius: 4px;
      pointer-events: none;
    }

    .cover-ornament-top,
    .cover-ornament-bottom {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--c-gold), transparent);
    }

    .cover-ornament-top {
      top: 24px;
    }

    .cover-ornament-bottom {
      bottom: 24px;
    }

    .cover-edition-badge {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--c-gold);
      padding: 0.35rem 1rem;
      border: 1px solid rgba(184, 150, 62, 0.3);
      border-radius: 50px;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .cover-title {
      font-family: var(--font-serif);
      font-weight: 800;
      font-size: clamp(1.2rem, 3.5vw, 1.7rem);
      line-height: 1.25;
      color: #f0e8d8;
      margin-bottom: 0.8rem;
      position: relative;
      z-index: 1;
    }

    .cover-title em {
      font-style: italic;
      color: var(--c-gold);
    }

    .cover-subtitle {
      font-size: 0.72rem;
      color: rgba(240, 232, 216, 0.5);
      max-width: 340px;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .cover-author {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      position: relative;
      z-index: 1;
    }

    .cover-author-name {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: 0.9rem;
      color: #f0e8d8;
    }

    .cover-author-role {
      font-size: 0.65rem;
      color: rgba(240, 232, 216, 0.4);
      letter-spacing: 0.05em;
    }

    .cover-cta {
      position: absolute;
      bottom: 40px;
      font-size: 0.6rem;
      color: rgba(240, 232, 216, 0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      animation: pulseGlow 2.5s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ══════════════════════════════════════════════
       MAGAZINE INTERIOR STYLES
    ══════════════════════════════════════════════ */
    .sec-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sec-label::before {
      content: '';
      width: 18px;
      height: 2px;
      background: var(--c-accent);
      border-radius: 2px;
    }

    .sec-title {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: var(--c-heading);
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: 0.8rem;
    }

    .sec-divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--c-accent), var(--c-accent2));
      border-radius: 2px;
      margin: 1rem 0;
    }

    .body-text {
      font-size: 0.78rem;
      line-height: 1.8;
      color: var(--c-text);
      text-align: justify;
      hyphens: auto;
    }

    .body-text p+p {
      margin-top: 0.7rem;
    }

    .body-text strong {
      color: var(--c-heading);
      font-weight: 700;
    }

    /* Info box in text */
    .info-box {
      background: linear-gradient(135deg, rgba(139, 90, 43, 0.06), rgba(107, 76, 138, 0.04));
      border-left: 3px solid var(--c-accent);
      border-radius: 0 8px 8px 0;
      padding: 0.8rem 1rem;
      margin: 0.8rem 0;
    }

    .info-box h4 {
      font-family: var(--font-serif);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--c-heading);
      margin-bottom: 0.3rem;
    }

    .info-box p {
      font-size: 0.72rem;
      color: var(--c-text);
      line-height: 1.65;
    }

    /* Issue/Solution cards */
    .issue-inset {
      background: linear-gradient(135deg, rgba(176, 58, 58, 0.06), rgba(107, 76, 138, 0.04));
      border: 1px solid rgba(176, 58, 58, 0.15);
      border-radius: 8px;
      padding: 0.8rem;
      margin: 0.8rem 0;
    }

    .issue-inset h4 {
      font-family: var(--font-serif);
      font-weight: 700;
      color: var(--c-red);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .issue-inset p {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--c-heading);
      line-height: 1.5;
      font-style: italic;
    }

    .solution-inset {
      background: linear-gradient(135deg, rgba(45, 122, 79, 0.06), rgba(139, 90, 43, 0.04));
      border: 1px solid rgba(45, 122, 79, 0.15);
      border-radius: 8px;
      padding: 0.8rem;
      margin: 0.5rem 0;
    }

    .solution-inset h4 {
      font-family: var(--font-serif);
      font-weight: 700;
      color: var(--c-green);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .solution-inset p {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--c-heading);
      line-height: 1.5;
    }

    .solution-inset .sub-text {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--c-text-dim);
      margin-top: 0.3rem;
      font-style: italic;
    }

    /* BerAKHLAK grid */
    .akhlak-mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }

    .akhlak-mini-item {
      padding: 0.55rem 0.7rem;
      background: rgba(139, 90, 43, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 6px;
      transition: border-color 0.3s;
    }

    .akhlak-mini-item:hover {
      border-color: var(--c-accent);
    }

    .akhlak-mini-item strong {
      display: block;
      font-size: 0.68rem;
      color: var(--c-heading);
      margin-bottom: 0.15rem;
    }

    .akhlak-mini-item span {
      font-size: 0.62rem;
      color: var(--c-text-dim);
      line-height: 1.5;
    }

    /* Activity header in page */
    .act-head {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1rem;
    }

    .act-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

          <p>Berdasarkan Undang-Undang Nomor 20 Tahun 2023 tentang Aparatur Sipil Negara, Pegawai ASN memiliki peran strategis sebagai perencana, pelaksana, dan pengawas penyelenggaraan tugas umum pemerintahan. Setiap ASN tidak hanya dituntut memiliki kompetensi teknis, tetapi juga wajib menginternalisasi nilai-nilai dasar <em>Core Values</em> ASN <strong>BerAKHLAK</strong> — Berorientasi Pelayanan, Akuntabel, Kompeten, Harmonis, Loyal, Adaptif, dan Kolaboratif. Nilai-nilai ini bukan sekadar semboyan, melainkan fondasi perilaku yang harus tecermin dalam setiap napas pelayanan guna menjaga integritas birokrasi.</p>
          <p>Pelatihan Dasar (Latsar) CPNS menjadi fase krusial bagi setiap calon aparatur untuk melakukan proses habituasi dan aktualisasi. Melalui pembelajaran Agenda III <em>"Kedudukan dan Peran PNS menuju Smart Governance"</em>, peserta dituntut bukan sekadar menjadi pelaksana tugas rutin, tetapi juga agen perubahan yang mampu memberikan gagasan kreatif dalam memecahkan isu strategis di unit kerja.</p>
          <p>Pemerintah Provinsi Sulawesi Tenggara melalui Dinas Koperasi, Usaha Mikro, Kecil dan Menengah memegang peranan vital dalam membina dan mengawasi perkembangan koperasi sebagai soko guru perekonomian nasional. Fokus utama saat ini adalah penguatan <strong>Koperasi Desa/Kelurahan Merah Putih</strong> sesuai amanat Instruksi Presiden Nomor 9 Tahun 2025 tentang Percepatan Pembentukan dan Penguatan Koperasi Desa/Kelurahan Merah Putih.</p>
          <p>Dalam realitas lapangan, pengawasan koperasi di Sulawesi Tenggara masih menemui kendala substantif. Sistem pengawasan yang berjalan masih didominasi metode konvensional — data koperasi tersimpan dalam dokumen fisik rentan rusak atau tabel digital statis yang terfragmentasi. Kondisi ini menciptakan <em>"siloed data"</em>, sehingga pimpinan dan tim Satgas kesulitan memetakan secara cepat koperasi mana yang aktif, memerlukan rehabilitasi, atau berada di wilayah berpotensi tinggi.</p>

      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const navPageText = document.getElementById('navPageText');
      const navPageTitle = document.getElementById('navPageTitle');
      const pageIndicator = document.getElementById('page-indicator');

      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage >= totalSpreads;

      // Calc visible page numbers
      const leftPageNum = currentPage * 2;
      const rightPageNum = currentPage * 2 + 1;

      if (currentPage === 0) {
        navPageText.textContent = 'Sampul';
        navPageTitle.textContent = pageTitles[0] || '';
      } else if (currentPage >= totalSpreads) {
        navPageText.textContent = `Halaman ${totalDisplayPages}`;
        navPageTitle.textContent = pageTitles[totalDisplayPages - 1] || '';
      } else {
        navPageText.textContent = `Hal. ${leftPageNum}–${Math.min(rightPageNum, totalDisplayPages - 1) + 1}`;
        const t1 = pageTitles[leftPageNum] || '';
        const t2 = pageTitles[rightPageNum] || '';
        navPageTitle.textContent = t1 && t2 ? `${t1} / ${t2}` : t1 || t2;
      }

      pageIndicator.textContent = `${currentPage + 1} / ${totalSpreads + 1}`;

      // Update dots
      document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentPage);
      });

      // Update z-index for proper stacking
      pages.forEach((p, i) => {
        if (p.classList.contains('flipped')) {
          p.style.zIndex = 100 + i;
        } else {
          p.style.zIndex = totalSpreads - i;
        }
      });
    }

    function flipNext() {
      if (currentPage >= totalSpreads || isAnimating) return;
      isAnimating = true;
      pages[currentPage].classList.add('flipped');
      currentPage++;
      updateControls();
      setTimeout(() => { isAnimating = false; }, 700);
    }

    function flipPrev() {
      if (currentPage <= 0 || isAnimating) return;
      isAnimating = true;
      currentPage--;
      pages[currentPage].classList.remove('flipped');
      updateControls();
      setTimeout(() => { isAnimating = false; }, 700);
    }

    function goToPage(targetSpread) {
      if (isAnimating) return;
      if (targetSpread === currentPage) return;

      isAnimating = true;
      const dir = targetSpread > currentPage ? 1 : -1;

      function step() {
        if (currentPage === targetSpread) {
          isAnimating = false;
          updateControls();
          return;
        }
        if (dir === 1) {
          pages[currentPage].classList.add('flipped');
          currentPage++;
        } else {
          currentPage--;
          pages[currentPage].classList.remove('flipped');
        }
        updateControls();
        setTimeout(step, 150);
      }
      step();
    }

    // Click on page to flip
    pages.forEach((p, i) => {
      p.addEventListener('click', (e) => {
        // Don't flip if clicking interactive elements
        if (e.target.closest('a, button, .tahapan-entry, .ak-collapse-btn, .back-home')) return;
        if (p.classList.contains('flipped')) {
          flipPrev();
        } else {
          flipNext();
        }
      });
    });

    // Buttons
    document.getElementById('prevBtn').addEventListener('click', flipPrev);
    document.getElementById('nextBtn').addEventListener('click', flipNext);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        flipNext();
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        flipPrev();
      }
    });

    // Swipe support
    let touchStartX = 0;
    let touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].screenX - touchStartX;
      const dy = e.changedTouches[0].screenY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0) flipNext(); else flipPrev();
      }
    }, { passive: true });

    // Build nav dots
    const navDotsEl = document.getElementById('navDots');
    for (let i = 0; i <= totalSpreads; i++) {
      const dot = document.createElement('div');
      dot.className = 'nav-dot';
      if (i === 0) dot.classList.add('active');
      dot.addEventListener('click', () => goToPage(i));
      navDotsEl.appendChild(dot);
    }

    updateControls();

    /* ── LIGHTBOX ── */
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbCaption = document.getElementById('lightbox-caption');

    function openLightbox(src, alt) {
      let hires = src;
      if (src.includes('thumbnail')) hires = src.replace(/sz=w\d+/, 'sz=w1600');
      lbImg.src = hires;
      lbImg.alt = alt;
      lbCaption.textContent = alt;
      lb.classList.add('open');
    }

    function closeLightbox() {
      lb.classList.remove('open');
      setTimeout(() => { lbImg.src = ''; }, 350);
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lb.addEventListener('click', e => { if (e.target === lb || e.target === lbImg) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>

</html>
